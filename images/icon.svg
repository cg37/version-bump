<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#61afef"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect with subtle gradient and border -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="125" height="125" rx="18.5" fill="none" stroke="#3a3a4e" stroke-width="1.5"/>

  <!-- Large "^" caret (inverted V) - left stroke -->
  <path d="M18 38 L42 92 L44 92" stroke="url(#arrow)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Large "^" caret (inverted V) - right stroke -->
  <path d="M44 92 L46 92 L70 38" stroke="url(#arrow)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Up arrow shaft -->
  <line x1="98" y1="88" x2="98" y2="34" stroke="url(#arrow)" stroke-width="9" stroke-linecap="round"/>
  <!-- Up arrow head -->
  <path d="M84 54 L98 34 L112 54" stroke="url(#arrow)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
